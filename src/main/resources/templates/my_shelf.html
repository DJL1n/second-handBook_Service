<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我的书架 - 管理发布</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📚 我的书架 (管理发布)</h2>
        <div>
            <!-- 🔥 1. 新增发布按钮 -->
            <button class="btn btn-success me-2" onclick="openCreateModal()">
                <i class="fas fa-plus"></i> 发布新书
            </button>
            <a href="/my-profile" class="btn btn-outline-primary me-2">查看订单</a>
            <a href="/" class="btn btn-secondary">返回市场</a>
        </div>
    </div>

    <!-- 书籍列表 -->
    <div class="row row-cols-1 row-cols-md-4 g-4">
        <div class="col" th:each="p : ${products}">
            <div class="card h-100 shadow-sm border-0">
                <div class="position-relative">
                    <img th:src="${(p.imageUrl == null || #strings.isEmpty(p.imageUrl))
                            ? 'https://picsum.photos/300/200?random=' + p.id
                            : (p.imageUrl.startsWith('http') ? p.imageUrl : '/' + p.imageUrl)}"
                         class="card-img-top" style="height: 150px; object-fit: cover;">

                    <!-- 状态标签 -->
                    <span th:if="${p.status == 'ON_SALE'}" class="position-absolute top-0 end-0 badge bg-success m-2">出售中</span>
                    <span th:if="${p.status == 'SOLD'}" class="position-absolute top-0 end-0 badge bg-secondary m-2">已卖出</span>
                    <span th:if="${p.status == 'OFF_SHELF'}" class="position-absolute top-0 end-0 badge bg-dark m-2">已下架</span>
                </div>

                <div class="card-body">
                    <h6 class="card-title text-truncate" th:text="${p.title}">书名</h6>
                    <p class="card-text text-danger fw-bold mb-1">¥ <span th:text="${p.price}"></span></p>
                    <p class="card-text small text-muted text-truncate" th:text="${p.description}">描述</p>
                </div>

                <div class="card-footer bg-white border-0 text-end">
                    <!-- 🔥 2. 操作按钮 (已卖出不可操作) -->
                    <div th:if="${p.status != 'SOLD'}">
                        <!-- 编辑按钮：利用 data-* 属性把当前书的信息存起来，传给 JS -->
                        <button class="btn btn-sm btn-outline-primary"
                                th:data-id="${p.id}"
                                th:data-title="${p.title}"
                                th:data-price="${p.price}"
                                th:data-desc="${p.description}"
                                onclick="openEditModal(this)">
                            <i class="fas fa-edit"></i> 编辑
                        </button>

                        <!-- 下架/上架按钮 -->
                        <button th:if="${p.status == 'ON_SALE'}"
                                th:onclick="'updateStatus(' + ${p.id} + ', \'OFF_SHELF\')'"
                                class="btn btn-sm btn-outline-danger">
                            <i class="fas fa-ban"></i> 下架
                        </button>
                        <button th:if="${p.status == 'OFF_SHELF'}"
                                th:onclick="'updateStatus(' + ${p.id} + ', \'ON_SALE\')'"
                                class="btn btn-sm btn-outline-success">
                            <i class="fas fa-upload"></i> 上架
                        </button>
                    </div>
                    <span th:if="${p.status == 'SOLD'}" class="small text-muted">交易完成，不可编辑</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 空状态 -->
    <div th:if="${#lists.isEmpty(products)}" class="text-center mt-5">
        <div class="text-muted display-1"><i class="fas fa-box-open"></i></div>
        <p class="lead mt-3">你还没有发布任何书籍</p>
        <button class="btn btn-warning rounded-pill px-4 fw-bold" onclick="openCreateModal()">立即发布</button>
    </div>
</div>

<!-- ==================== 🔥 编辑/发布 模态框 ==================== -->
<div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">发布新书</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <!-- enctype="multipart/form-data" 用于支持文件上传 -->
            <form action="/product/save" method="post" enctype="multipart/form-data">
                <div class="modal-body">
                    <!-- 隐藏域：存商品ID (如果有ID则是修改，没有则是新增) -->
                    <input type="hidden" id="productId" name="id">

                    <div class="mb-3">
                        <label class="form-label">书名/标题</label>
                        <input type="text" class="form-control" id="productTitle" name="title" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">价格 (¥)</label>
                        <input type="number" step="0.01" class="form-control" id="productPrice" name="price" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">商品描述</label>
                        <textarea class="form-control" id="productDesc" name="description" rows="3" placeholder="描述书的新旧程度、版本等" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">上传图片</label>
                        <input type="file" class="form-control" name="image" accept="image/*">
                        <div class="form-text text-muted">支持 jpg, png 格式。如果编辑时不选，则保留原图。</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary">保存提交</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // 1. 打开“发布新书”弹窗
    function openCreateModal() {
        // 清空表单
        document.getElementById('productId').value = '';
        document.getElementById('productTitle').value = '';
        document.getElementById('productPrice').value = '';
        document.getElementById('productDesc').value = '';
        document.getElementById('modalTitle').innerText = "✨ 发布新书";

        new bootstrap.Modal(document.getElementById('productModal')).show();
    }

    // 2. 打开“编辑”弹窗 (从按钮的 data- 属性获取数据)
    function openEditModal(btn) {
        // 回填数据
        document.getElementById('productId').value = btn.getAttribute('data-id');
        document.getElementById('productTitle').value = btn.getAttribute('data-title');
        document.getElementById('productPrice').value = btn.getAttribute('data-price');
        document.getElementById('productDesc').value = btn.getAttribute('data-desc');
        document.getElementById('modalTitle').innerText = "📝 编辑商品";

        new bootstrap.Modal(document.getElementById('productModal')).show();
    }

    // 3. 上架/下架 操作
    function updateStatus(id, newStatus) {
        if(!confirm("确定要执行此操作吗？")) return;

        fetch('/product/status/' + id + '?status=' + newStatus, {
            method: 'POST'
        })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    location.reload(); // 刷新页面
                } else {
                    alert("操作失败: " + data.message);
                }
            });
    }
</script>

</body>
</html>
