<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我的书架</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📚 我的书架 (发布管理)</h2>
        <div>
            <a href="/my-profile" class="btn btn-outline-primary me-2">查看订单</a>
            <a href="/" class="btn btn-secondary">返回市场</a>
        </div>
    </div>

    <!-- 这里的卡片列表稍微紧凑一点 -->
    <div class="row row-cols-1 row-cols-md-4 g-4">
        <div class="col" th:each="p : ${products}">
            <div class="card h-100 shadow-sm border-0">
                <div class="position-relative">
                    <img th:src="${p.imageUrl != null ? p.imageUrl : 'https://picsum.photos/300/200?random=' + p.id}"
                         class="card-img-top" style="height: 150px; object-fit: cover;">
                    <!-- 状态标签悬浮 -->
                    <span th:if="${p.status == 'ON_SALE'}" class="position-absolute top-0 end-0 badge bg-success m-2">出售中</span>
                    <span th:if="${p.status == 'SOLD'}" class="position-absolute top-0 end-0 badge bg-secondary m-2">已卖出</span>
                </div>

                <div class="card-body">
                    <h6 class="card-title text-truncate" th:text="${p.title}">书名</h6>
                    <p class="card-text text-danger fw-bold mb-1">¥ <span th:text="${p.price}"></span></p>
                    <p class="card-text small text-muted text-truncate" th:text="${p.description}">描述</p>
                </div>
                <div class="card-footer bg-white border-0 text-end">
                    <!-- 这里预留编辑和删除按钮 -->
                    <button class="btn btn-sm btn-outline-secondary" disabled>编辑</button>
                    <button class="btn btn-sm btn-outline-danger" disabled>下架</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 空状态 -->
    <div th:if="${#lists.isEmpty(products)}" class="text-center mt-5">
        <div class="text-muted display-1"><i class="fas fa-box-open"></i></div>
        <p class="lead mt-3">你还没有发布任何书籍</p>
        <button class="btn btn-warning rounded-pill px-4 fw-bold">立即发布 (开发中)</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
