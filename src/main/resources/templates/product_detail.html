<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${product.title}">详情</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- 顶部导航 -->
<nav class="navbar navbar-light bg-white shadow-sm mb-4">
    <div class="container">
        <a class="btn btn-link text-dark text-decoration-none" href="/"><i class="fas fa-arrow-left"></i> 返回市场</a>
        <span class="fw-bold text-secondary">商品详情</span>
    </div>
</nav>

<div class="container">
    <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
        <div class="row g-0">
            <!-- 左侧：图片展示区 -->
            <div class="col-md-6 bg-white d-flex align-items-center justify-content-center p-4 bg-light">
                <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://picsum.photos/600/600?random=' + product.id}"
                     class="img-fluid rounded-3 shadow-sm" style="max-height: 500px; width: 100%; object-fit: cover;" alt="商品图片">
            </div>

            <!-- 右侧：商品信息区 -->
            <div class="col-md-6 p-5 d-flex flex-column bg-white">
                <div class="mb-auto">
                    <!-- 状态标签 -->
                    <span th:if="${product.status == 'ON_SALE'}" class="badge bg-success mb-2">正在出售</span>
                    <span th:if="${product.status == 'SOLD'}" class="badge bg-secondary mb-2">已售出</span>

                    <h2 class="fw-bold mb-2" th:text="${product.title}">Java编程思想</h2>
                    <p class="text-muted mb-3"><i class="fas fa-user-edit"></i> 作者: <span th:text="${product.author}">Bruce Eckel</span></p>

                    <h1 class="text-danger fw-bold mb-4">¥ <span th:text="${product.price}">88.00</span></h1>

                    <!-- 卖家描述卡片 -->
                    <div class="card bg-light border-0 p-3 mb-4 rounded-3">
                        <div class="d-flex align-items-center mb-2">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="rounded-circle me-2" width="30">
                            <span class="fw-bold small text-secondary">卖家描述</span>
                        </div>
                        <p class="mb-0 text-dark" th:text="${product.description}">暂无描述...</p>
                    </div>

                    <ul class="list-unstyled text-secondary small mb-4">
                        <li><i class="fas fa-check-circle text-success"></i> 平台担保交易</li>
                        <li><i class="fas fa-check-circle text-success"></i> 校园实名认证</li>
                    </ul>
                </div>

                <!-- 底部操作按钮 -->
                <div class="d-grid gap-2">
                    <!-- 只有在售状态才显示购买按钮 -->
                    <button th:if="${product.status == 'ON_SALE'}"
                            th:onclick="'buyNow(' + ${product.id} + ')'"
                            class="btn btn-warning btn-lg rounded-pill fw-bold text-dark">
                        <i class="fas fa-shopping-cart"></i> 我想要
                    </button>

                    <button th:if="${product.status == 'SOLD'}" disabled class="btn btn-secondary btn-lg rounded-pill">
                        来晚了，已被抢走 😭
                    </button>

                    <a href="/" class="btn btn-outline-secondary rounded-pill">再去逛逛</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function buyNow(productId) {
        // Thymeleaf 判断是否登录
        /*<![CDATA[*/
        var isLogged = [[${#authorization.expression('isAuthenticated()')}]];
        /*]]>*/

        if (!isLogged) {
            alert("请先登录再购买！");
            window.location.href = '/login'; // 这里简单跳转，或者你可以集成之前的 Modal 弹窗
            return;
        }

        if(!confirm('确定要购买这本书吗？下单后请在"个人中心"查看订单。')) return;

        // AJAX 提交购买请求
        fetch('/api/trade/buy/' + productId, {
            method: 'POST'
        })
            .then(response => response.json())
            .then(data => {
                if (data.code === 200) {
                    alert("🎉 恭喜！" + data.message);
                    window.location.href = "/my-profile"; // 买完跳去订单页
                } else {
                    alert("❌ 购买失败: " + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert("系统错误，请稍后再试");
            });
    }
</script>

</body>
</html>
