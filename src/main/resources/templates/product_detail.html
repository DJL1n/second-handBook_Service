<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.title}">详情</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="row g-0">
            <!-- 左侧：图片 (模拟滑动窗口/轮播图) -->
            <div class="col-md-6 bg-white d-flex align-items-center justify-content-center p-3">
                <!-- 这里暂时只放一张图，后续可以改成 Bootstrap Carousel -->
                <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://picsum.photos/600/600?random=' + product.productId}"
                     class="img-fluid rounded-3" style="max-height: 500px;">
            </div>

            <!-- 右侧：信息 -->
            <div class="col-md-6 p-5 d-flex flex-column">
                <div class="mb-auto">
                    <div class="badge bg-warning text-dark mb-2">担保交易</div>
                    <h2 class="fw-bold mb-3" th:text="${product.title}"></h2>
                    <h1 class="text-danger fw-bold mb-4">¥ <span th:text="${product.price}"></span></h1>

                    <div class="card bg-light border-0 p-3 mb-4 rounded-3">
                        <h6 class="text-muted mb-2">卖家描述</h6>
                        <p class="mb-0 text-secondary" th:text="${product.description}"></p>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button onclick="buyNow()" class="btn btn-danger btn-lg rounded-pill fw-bold">我想要</button>
                    <a href="/" class="btn btn-outline-secondary rounded-pill">再去逛逛</a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 复用刚才的登录逻辑，这里简单起见，如果未登录直接跳登录页，或者你可以把上面的 Modal 复制过来 -->
<script>
    function buyNow() {
        /*<![CDATA[*/
        var isLogged = [[${#authorization.expression('isAuthenticated()')}]];
        /*]]>*/

        if (!isLogged) {
            alert("请先登录！"); // 这里应该调用 showLoginModal()，为了代码简洁先这样
            window.location.href = '/login';
            return;
        }

        if(confirm('确认下单吗？')) {
            // 发送购买请求...
            alert('功能开发中...');
        }
    }
</script>

</body>
</html>
