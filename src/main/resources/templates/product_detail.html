<!DOCTYPE html>
<!-- 1. 引入 Spring Security 标签库 xmlns:sec -->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${product.title}">详情</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- 2. 顶部导航栏：改为左右布局 -->
<nav class="navbar navbar-light bg-white shadow-sm mb-4 sticky-top">
    <div class="container d-flex justify-content-between align-items-center">

        <!-- 左侧：返回及标题 -->
        <div class="d-flex align-items-center">
            <a class="btn btn-link text-dark text-decoration-none me-3" href="/">
                <i class="fas fa-arrow-left"></i> 返回市场
            </a>
            <span class="fw-bold text-secondary border-start ps-3 d-none d-md-block">商品详情</span>
        </div>

        <!-- 右侧：登录状态判断 -->
        <div>
            <!-- 情况A：未登录 -->
            <div sec:authorize="!isAuthenticated()">
                <span class="text-muted small me-2">喜欢这个商品?</span>

                <!-- ✅ 关键修改在这里：使用跳板链接 -->
                <a th:href="@{/require-login(target='/product/' + ${product.id})}"
                   class="btn btn-outline-primary btn-sm rounded-pill px-3 me-1">
                    登录
                </a>
                <a href="/register" class="btn btn-primary btn-sm rounded-pill px-3">注册</a>
            </div>

            <!-- 情况B：已登录 -->
            <div sec:authorize="isAuthenticated()" class="d-flex align-items-center">
                <span class="text-dark me-3 small">
                    <i class="fas fa-user-circle text-primary"></i>
                    你好, <span class="fw-bold" sec:authentication="name">User</span>
                </span>
                <a href="/my-profile" class="btn btn-outline-dark btn-sm rounded-pill me-2">个人中心</a>
                <form action="/logout" method="post" class="d-inline">
                    <button type="submit" class="btn btn-link text-secondary text-decoration-none btn-sm p-0">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
        <div class="row g-0">
            <!-- 左侧：图片展示区 -->
            <div class="col-md-6 bg-white d-flex align-items-center justify-content-center p-4 bg-light">
                <img th:src="${(product.imageUrl == null || #strings.isEmpty(product.imageUrl))
                    ? 'https://picsum.photos/600/600?random=' + product.id
                    : (product.imageUrl.startsWith('http') ? product.imageUrl : '/' + product.imageUrl)}"
                     onerror="this.onerror=null; this.src='https://picsum.photos/600/600?random=error';"
                     class="img-fluid rounded-3 shadow-sm"
                     style="max-height: 500px; width: 100%; object-fit: cover;"
                     alt="商品图片">
            </div>

            <!-- 右侧：商品信息区 -->
            <div class="col-md-6 p-5 d-flex flex-column bg-white">
                <div class="mb-auto">
                    <!-- 状态标签 -->
                    <span th:if="${product.status == 'ON_SALE'}" class="badge bg-success mb-2">正在出售</span>
                    <span th:if="${product.status == 'SOLD'}" class="badge bg-secondary mb-2">已售出</span>

                    <h2 class="fw-bold mb-2" th:text="${product.title}">Java编程思想</h2>
                    <p class="text-muted mb-3">
                        <i class="fas fa-clock"></i> 上架时间:
                        <span th:text="${#temporals.format(product.createdAt, 'yyyy-MM-dd HH:mm')}">2023-01-01</span>
                    </p>
                    <h1 class="text-danger fw-bold mb-4">¥ <span th:text="${product.price}">88.00</span></h1>

                    <!-- 卖家描述卡片 -->
                    <div class="card bg-light border-0 p-3 mb-4 rounded-3">
                        <div class="d-flex align-items-center mb-2">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="rounded-circle me-2" width="30">
                            <span class="fw-bold small text-secondary">卖家描述</span>
                        </div>
                        <p class="mb-0 text-dark" th:text="${product.description}">暂无描述...</p>
                    </div>

                    <ul class="list-unstyled text-secondary small mb-4">
                        <li><i class="fas fa-check-circle text-success"></i> 平台担保交易</li>
                        <li><i class="fas fa-check-circle text-success"></i> 校园实名认证</li>
                    </ul>
                </div>

                <!-- 底部操作按钮 -->
                <div class="d-grid gap-2">
                    <!-- 只有在售状态才显示购买按钮 -->
                    <button th:if="${product.status == 'ON_SALE'}"
                            th:onclick="'buyNow(' + ${product.id} + ')'"
                            class="btn btn-warning btn-lg rounded-pill fw-bold text-dark">
                        <i class="fas fa-shopping-cart"></i> 我想要
                    </button>

                    <button th:if="${product.status == 'SOLD'}" disabled class="btn btn-secondary btn-lg rounded-pill">
                        来晚了，已被抢走 😭
                    </button>

                    <!-- 分享或收藏按钮（可选） -->
                    <!-- <button class="btn btn-outline-secondary rounded-pill">收藏商品</button> -->
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function buyNow(productId) {
        // Thymeleaf 获取后端登录状态
        /*<![CDATA[*/
        var isLogged = [[${#authorization.expression('isAuthenticated()')}]];
        /*]]>*/

        // 3. 修改 JS 逻辑：如果未登录，只提示，不跳转
        if (!isLogged) {
            alert("请先点击右上角的【登录】按钮登录后再购买！");
            // window.location.href = '/login'; // 已注释：不再自动跳转
            return; // 直接结束函数，停留在当前页面
        }

        if(!confirm('确定要购买这本书吗？下单后请在"个人中心"查看订单。')) return;

        // AJAX 提交购买请求
        fetch('/api/trade/buy/' + productId, {
            method: 'POST'
        })
            .then(response => response.json())
            .then(data => {
                if (data.code === 200) {
                    alert("🎉 恭喜！" + data.message);
                    window.location.href = "/my-profile"; // 买完跳去订单页
                } else {
                    alert("❌ 购买失败: " + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert("系统错误，请稍后再试");
            });
    }
</script>

</body>
</html>
