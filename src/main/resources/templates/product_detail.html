<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.title}">详情</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- 引入 Navbar (建议之后把 Navbar 抽离成 fragment，这里为了完整性先写在这里) -->
<nav class="navbar navbar-light bg-white shadow-sm mb-4 sticky-top">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <a class="btn btn-link text-dark text-decoration-none me-3" href="/">
                <i class="fas fa-arrow-left"></i> 返回市场
            </a>
            <span class="fw-bold text-secondary border-start ps-3">商品详情</span>
        </div>
        <div>
            <!-- 🔥 Navbar 增加消息入口 -->
            <div sec:authorize="isAuthenticated()" class="d-flex align-items-center">
                <a href="/my-messages" class="btn btn-link text-dark position-relative me-3">
                    <i class="fas fa-comment-dots fa-lg"></i>
                    <!-- 红点 (AJAX 控制显示) -->
                    <span id="nav-badge" class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle d-none">
                        <span class="visually-hidden">New alerts</span>
                    </span>
                </a>

                <span class="text-dark me-2 small">
                    <i class="fas fa-user-circle text-primary"></i>
                    <span sec:authentication="name">User</span>
                </span>
                <a href="/my-profile" class="btn btn-outline-dark btn-sm rounded-pill">个人中心</a>
            </div>

            <div sec:authorize="!isAuthenticated()">
                <a th:href="@{/login}" class="btn btn-primary btn-sm rounded-pill px-3">登录</a>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
        <div class="row g-0">
            <!-- 图片区域 -->
            <div class="col-md-6 bg-light d-flex align-items-center justify-content-center p-4">
                <img th:src="${(product.imageUrl == null || #strings.isEmpty(product.imageUrl))
                    ? 'https://picsum.photos/600/600?random=' + product.id
                    : (product.imageUrl.startsWith('http') ? product.imageUrl : '/' + product.imageUrl)}"
                     class="img-fluid rounded-3 shadow-sm" style="max-height: 500px; width: 100%; object-fit: cover;">
            </div>

            <!-- 信息区域 -->
            <div class="col-md-6 p-5 d-flex flex-column bg-white">
                <div class="mb-auto">
                    <span th:if="${product.status == 'ON_SALE'}" class="badge bg-success mb-2">正在出售</span>
                    <span th:if="${product.status == 'SOLD'}" class="badge bg-secondary mb-2">已售出</span>

                    <h2 class="fw-bold mb-2" th:text="${product.title}">书名</h2>
                    <h1 class="text-danger fw-bold mb-4">¥ <span th:text="${product.price}"></span></h1>

                    <div class="card bg-light border-0 p-3 mb-4 rounded-3">
                        <div class="d-flex align-items-center mb-2">
                            <span class="fw-bold small text-secondary">卖家描述</span>
                        </div>
                        <p class="mb-0 text-dark" th:text="${product.description}"></p>
                    </div>
                </div>

                <!-- 🔥 按钮区域：拆分为 [聊一聊] 和 [立即购买] -->
                <div class="row g-2" th:if="${product.status == 'ON_SALE'}">
                    <div class="col-6">
                        <!-- 聊一聊按钮 -->
                        <button onclick="openChatModal()" class="btn btn-outline-primary w-100 btn-lg rounded-pill">
                            <i class="fas fa-comments"></i> 聊一聊
                        </button>
                    </div>
                    <div class="col-6">
                        <!-- 购买按钮 -->
                        <button th:onclick="'buyNow(' + ${product.id} + ')'"
                                class="btn btn-warning w-100 btn-lg rounded-pill fw-bold">
                            <i class="fas fa-shopping-bag"></i> 立即购买
                        </button>
                    </div>
                </div>

                <button th:if="${product.status == 'SOLD'}" disabled class="btn btn-secondary btn-lg rounded-pill w-100">
                    来晚了，已被抢走 😭
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 🔥 聊天弹窗 Modal -->
<div class="modal fade" id="chatModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">💬 发送消息给卖家</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <textarea id="chatContent" class="form-control" rows="4" placeholder="你好，我对这本书感兴趣，可以便宜点吗？"></textarea>
                <!-- 隐藏字段：存卖家ID -->
                <input type="hidden" id="sellerId" th:value="${product.sellerId}">
                <input type="hidden" id="productId" th:value="${product.id}">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    /*<![CDATA[*/
    var isLogged = [[${#authorization.expression('isAuthenticated()')}]];
    var currentUserId = [[${#authentication.principal instanceof T(com.wjs.secondhandbook.model.User) ? #authentication.principal.userId : -1}]];
    // 注意：上面获取 ID 的方式取决于你的 UserDetails 实现，如果没有 userId 字段，可能需要调整
    /*]]>*/

    // 1. 打开聊天窗口
    function openChatModal() {
        if (!isLogged) {
            alert("请先登录！");
            location.href = "/login";
            return;
        }
        // 不能给自己发消息
        var sellerId = document.getElementById('sellerId').value;
        // 这里简单判断，如果是自己就在后端拦截，前端也可以加判断逻辑

        new bootstrap.Modal(document.getElementById('chatModal')).show();
    }

    // 2. 发送消息
    function sendMessage() {
        var content = document.getElementById('chatContent').value;
        var sellerId = document.getElementById('sellerId').value;
        var productId = document.getElementById('productId').value;

        if(!content.trim()) return;

        fetch('/api/message/send', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                receiverId: sellerId,
                content: content,
                productId: productId
            })
        }).then(res => res.json()).then(data => {
            if(data.success) {
                alert("发送成功！卖家上线后会收到提醒。");
                bootstrap.Modal.getInstance(document.getElementById('chatModal')).hide();
                document.getElementById('chatContent').value = ''; // 清空
            } else {
                alert("发送失败: " + data.message);
            }
        });
    }

    // 3. 购买逻辑 (保持不变)
    function buyNow(id) {
        if (!isLogged) { alert("请先登录"); return; }
        if(!confirm("确定购买吗？")) return;
        fetch('/api/trade/buy/' + id, {method: 'POST'}).then(r=>r.json()).then(d=>{
            alert(d.message);
            if(d.success) location.href = "/my-profile";
        });
    }

    // 4. 🔥 检查未读消息 (红点逻辑)
    if (isLogged) {
        fetch('/api/message/unread-count')
            .then(r => r.json())
            .then(d => {
                if(d.count > 0) {
                    document.getElementById('nav-badge').classList.remove('d-none');
                }
            });
    }
</script>

</body>
</html>
